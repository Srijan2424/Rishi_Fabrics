services:
  - type: web
    name: rishi-fabrics-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm --workspace apps/api exec prisma generate && npm --workspace apps/api run build
    startCommand: npm --workspace apps/api run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: ADMIN_ALERT_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: tech-packs
      - key: SENTRY_DSN
        sync: false
