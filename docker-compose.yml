services:
  postgres:
    image: postgres:16-alpine
    container_name: manufacturing-control-tower-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: controltower
      POSTGRES_PASSWORD: controltower
      POSTGRES_DB: manufacturing_control_tower
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

